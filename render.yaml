services:
  - type: web
    name: neighborly
    env: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn neighborlyApp.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: neighborly-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.9.0

databases:
  - name: neighborly-db
    databaseName: neighborly
    user: neighborly
